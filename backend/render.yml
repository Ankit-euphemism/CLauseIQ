services:
  - type: web
    name: clauseiq
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false          # Will be set manually in dashboard
    healthCheckPath: /health