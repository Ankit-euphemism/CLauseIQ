name: Deploy ClauseIQ Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'       # Only trigger when backend changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout full repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'  # Specify the Python version you need

      # 3. Install deps from backend/ folder
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Zip only backend/ folder for deployment
      - name: Zip backend folder
        run: |
          cd backend
          zip -r ../release.zip .    # Zips contents of backend/ not the folder itself

      # 5. Deploy to Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'clauseiq-backend'         # Your Azure App Service name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip